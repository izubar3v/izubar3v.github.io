<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>CRASH — Casino</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:     #070710;
    --bg2:    #0d0d1f;
    --bg3:    #12122a;
    --panel:  #161630;
    --border: #2a2a55;
    --accent: #00e5ff;
    --purple: #7b2fff;
    --green:  #00ff88;
    --red:    #ff3c5a;
    --gold:   #ffd600;
    --text:   #e8e8ff;
    --muted:  #6666aa;
  }

  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Rajdhani', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content:'';
    position:fixed; inset:0;
    background-image:
      linear-gradient(rgba(0,229,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,229,255,0.03) 1px, transparent 1px);
    background-size:40px 40px;
    pointer-events:none; z-index:0;
  }

  .app {
    position:relative; z-index:1;
    max-width:480px; margin:0 auto;
    padding:10px; display:flex;
    flex-direction:column; gap:8px;
    min-height:100vh;
  }

  .header {
    display:flex; align-items:center; justify-content:space-between;
    padding:10px 14px;
    background:var(--panel); border:1px solid var(--border); border-radius:14px;
  }
  .logo {
    font-family:'Orbitron',monospace; font-size:18px; font-weight:900; letter-spacing:3px;
    background:linear-gradient(90deg,var(--accent),var(--purple));
    -webkit-background-clip:text; -webkit-text-fill-color:transparent;
  }
  .username { font-size:12px; color:var(--muted); font-weight:600; margin-top:2px; }
  .balance-pill {
    display:flex; align-items:center; gap:6px;
    background:var(--bg3); border:1px solid var(--border); border-radius:20px;
    padding:6px 14px;
  }
  .balance-amount {
    font-family:'Orbitron',monospace; font-size:14px; font-weight:700; color:var(--gold);
  }

  .game-area {
    background:var(--panel); border:1px solid var(--border); border-radius:16px;
    overflow:hidden; position:relative;
  }
  canvas { display:block; width:100%; height:210px; }

  .mult-overlay {
    position:absolute; inset:0;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    pointer-events:none;
  }
  .mult-label {
    font-size:11px; font-weight:700; letter-spacing:4px; color:var(--muted);
    text-transform:uppercase; margin-bottom:2px;
  }
  .mult-val {
    font-family:'Orbitron',monospace; font-size:54px; font-weight:900; line-height:1;
    transition: color .15s, text-shadow .15s;
  }
  .c-neutral { color:var(--accent);  text-shadow:0 0 24px rgba(0,229,255,.5); }
  .c-green   { color:var(--green);   text-shadow:0 0 24px rgba(0,255,136,.6); }
  .c-red     { color:var(--red);     text-shadow:0 0 24px rgba(255,60,90,.6); }
  .c-wait    { color:var(--purple);  text-shadow:0 0 24px rgba(123,47,255,.5); }
  .mult-x { font-size:22px; vertical-align:super; }

  .countdown-wrap {
    position:absolute; inset:0;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    background:rgba(7,7,16,.75);
    transition: opacity .3s;
  }
  .countdown-wrap.hidden { opacity:0; pointer-events:none; }
  .cdown-ring { position:relative; width:100px; height:100px; }
  .cdown-ring svg { transform:rotate(-90deg); }
  .cdown-track { fill:none; stroke:var(--border); stroke-width:6; }
  .cdown-fill  {
    fill:none; stroke:var(--purple); stroke-width:6;
    stroke-linecap:round; stroke-dasharray:283; stroke-dashoffset:0;
    transition:stroke-dashoffset .9s linear, stroke .3s;
  }
  .cdown-num {
    position:absolute; inset:0; display:flex; flex-direction:column;
    align-items:center; justify-content:center;
  }
  .cdown-sec { font-family:'Orbitron',monospace; font-size:30px; font-weight:900; color:white; }
  .cdown-txt { font-size:10px; font-weight:700; letter-spacing:2px; color:var(--muted); text-transform:uppercase; }
  .cdown-hint { margin-top:12px; font-size:13px; font-weight:700; letter-spacing:1px; color:var(--muted); text-transform:uppercase; }
  .cdown-hint span { color:var(--accent); }

  .status-badge {
    position:absolute; bottom:10px; left:50%; transform:translateX(-50%);
    font-family:'Rajdhani',sans-serif; font-size:11px; font-weight:700;
    letter-spacing:3px; text-transform:uppercase; padding:3px 12px;
    border-radius:20px; white-space:nowrap;
  }
  .sb-wait    { background:rgba(123,47,255,.25); color:var(--purple); border:1px solid var(--purple); }
  .sb-run     { background:rgba(0,229,255,.12);  color:var(--accent); border:1px solid var(--accent); animation:blink 1s infinite; }
  .sb-crash   { background:rgba(255,60,90,.2);   color:var(--red);    border:1px solid var(--red); }
  .sb-cashout { background:rgba(0,255,136,.2);   color:var(--green);  border:1px solid var(--green); }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.55} }

  .history-bar {
    display:flex; gap:6px; overflow-x:auto; padding:8px 12px;
    background:var(--panel); border:1px solid var(--border); border-radius:12px;
    scrollbar-width:none; align-items:center;
  }
  .history-bar::-webkit-scrollbar { display:none; }
  .h-label { color:var(--muted); font-size:11px; font-weight:700; letter-spacing:2px; white-space:nowrap; flex-shrink:0; }
  .hchip {
    flex-shrink:0; font-family:'Orbitron',monospace; font-size:10px; font-weight:700;
    padding:3px 8px; border-radius:7px; animation:pop .25s ease;
  }
  @keyframes pop { from{opacity:0;transform:scale(.7)} to{opacity:1;transform:scale(1)} }
  .hchip.low  { background:rgba(255,60,90,.2);  color:var(--red);    border:1px solid rgba(255,60,90,.35); }
  .hchip.mid  { background:rgba(0,229,255,.12); color:var(--accent); border:1px solid rgba(0,229,255,.25); }
  .hchip.high { background:rgba(255,214,0,.18); color:var(--gold);   border:1px solid rgba(255,214,0,.35); }

  .bet-panel {
    background:var(--panel); border:1px solid var(--border); border-radius:16px;
    padding:14px; display:flex; flex-direction:column; gap:10px;
  }
  .bet-row { display:flex; align-items:center; gap:10px; }
  .bet-lbl { font-size:11px; font-weight:700; letter-spacing:2px; text-transform:uppercase; color:var(--muted); white-space:nowrap; width:72px; }
  .bet-input {
    flex:1; background:var(--bg3); border:1px solid var(--border); border-radius:10px;
    color:var(--text); font-family:'Orbitron',monospace; font-size:16px; font-weight:700;
    padding:10px 14px; outline:none; width:100%;
    -moz-appearance:textfield; transition:border-color .2s, box-shadow .2s;
  }
  .bet-input::-webkit-outer-spin-button,
  .bet-input::-webkit-inner-spin-button { -webkit-appearance:none; }
  .bet-input:focus { border-color:var(--accent); box-shadow:0 0 0 2px rgba(0,229,255,.15); }
  .bet-input:disabled { opacity:.45; }

  .qbets { display:flex; gap:6px; }
  .qb {
    flex:1; background:var(--bg3); border:1px solid var(--border); border-radius:8px;
    color:var(--muted); font-family:'Rajdhani',sans-serif; font-size:13px; font-weight:700;
    padding:8px 2px; cursor:pointer; text-align:center;
    transition:all .15s; user-select:none;
  }
  .qb:not(:disabled):active { transform:scale(.92); }
  .qb:not(:disabled):hover  { background:rgba(123,47,255,.2); border-color:var(--purple); color:white; }
  .qb:disabled { opacity:.3; cursor:not-allowed; }

  .auto-row { display:flex; align-items:center; gap:10px; }
  .tgl-wrap { display:flex; align-items:center; gap:7px; cursor:pointer; user-select:none; }
  .tgl {
    width:34px; height:19px; background:var(--bg3); border:1px solid var(--border);
    border-radius:10px; position:relative; transition:background .2s, border-color .2s; flex-shrink:0;
  }
  .tgl.on { background:var(--purple); border-color:var(--purple); }
  .tgl::after {
    content:''; position:absolute; top:2px; left:2px;
    width:13px; height:13px; background:white; border-radius:50%; transition:transform .2s;
  }
  .tgl.on::after { transform:translateX(15px); }
  .tgl-lbl { font-size:11px; font-weight:700; letter-spacing:1px; text-transform:uppercase; color:var(--muted); }
  .auto-in {
    width:80px; background:var(--bg3); border:1px solid var(--border); border-radius:8px;
    color:var(--text); font-family:'Orbitron',monospace; font-size:13px; font-weight:700;
    padding:7px 10px; outline:none; -moz-appearance:textfield; transition:border-color .2s;
  }
  .auto-in::-webkit-outer-spin-button,.auto-in::-webkit-inner-spin-button { -webkit-appearance:none; }
  .auto-in:focus { border-color:var(--purple); }
  .auto-in:disabled { opacity:.35; }

  .btn-action {
    width:100%; padding:15px; border:none; border-radius:14px;
    font-family:'Orbitron',monospace; font-size:15px; font-weight:900; letter-spacing:2px;
    cursor:pointer; position:relative; overflow:hidden; transition:all .2s;
  }
  .btn-action::after {
    content:''; position:absolute; inset:0;
    background:rgba(255,255,255,.08); opacity:0; transition:opacity .15s;
  }
  .btn-action:not(:disabled):active::after { opacity:1; }
  .btn-place   { background:linear-gradient(135deg,#7b2fff,#00e5ff); color:white; box-shadow:0 4px 22px rgba(123,47,255,.5); }
  .btn-cashout { background:linear-gradient(135deg,#00ff88,#00e5b0); color:#050520; box-shadow:0 4px 22px rgba(0,255,136,.5); animation:cashPulse .8s infinite; }
  .btn-cancel  { background:rgba(255,60,90,.15); color:var(--red); border:1px solid rgba(255,60,90,.4); }
  .btn-wait    { background:var(--bg3); color:var(--muted); border:1px solid var(--border); cursor:not-allowed; }
  @keyframes cashPulse { 0%,100%{box-shadow:0 4px 22px rgba(0,255,136,.5)} 50%{box-shadow:0 4px 36px rgba(0,255,136,.9)} }

  .stats-row { display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px; }
  .stat-card {
    background:var(--panel); border:1px solid var(--border); border-radius:12px;
    padding:10px; text-align:center;
  }
  .stat-v { font-family:'Orbitron',monospace; font-size:14px; font-weight:700; margin-bottom:2px; }
  .sv-g { color:var(--green); }
  .sv-r { color:var(--red); }
  .sv-o { color:var(--gold); }
  .stat-l { font-size:9px; font-weight:700; letter-spacing:1px; text-transform:uppercase; color:var(--muted); }

  .toast {
    position:fixed; top:16px; left:50%;
    transform:translateX(-50%) translateY(-90px);
    background:var(--panel); border:1px solid var(--border); border-radius:12px;
    padding:10px 20px; font-family:'Orbitron',monospace; font-size:12px; font-weight:700;
    z-index:999; transition:transform .35s cubic-bezier(.34,1.56,.64,1); white-space:nowrap;
  }
  .toast.show { transform:translateX(-50%) translateY(0); }
  .tw { border-color:var(--green)!important; color:var(--green)!important; box-shadow:0 0 20px rgba(0,255,136,.4)!important; }
  .tl { border-color:var(--red)!important;   color:var(--red)!important;   box-shadow:0 0 20px rgba(255,60,90,.4)!important; }
  .ti { border-color:var(--gold)!important;  color:var(--gold)!important; }

  .particles { position:fixed; inset:0; pointer-events:none; z-index:10; overflow:hidden; }
  .pt { position:absolute; border-radius:50%; animation:fly 1s ease-out forwards; }
  @keyframes fly { 0%{opacity:1;transform:translate(0,0) scale(1)} 100%{opacity:0;transform:translate(var(--tx),var(--ty)) scale(0)} }

  ::-webkit-scrollbar { width:3px; height:3px; }
  ::-webkit-scrollbar-thumb { background:var(--border); border-radius:3px; }
</style>
</head>
<body>

<div class="particles" id="particles"></div>
<div class="toast" id="toast"></div>

<div class="app">

  <div class="header">
    <div>
      <div class="logo">CRASH</div>
      <div class="username" id="username">Гость</div>
    </div>
    <div class="balance-pill">
      <span>🪙</span>
      <span class="balance-amount" id="balanceEl">1000</span>
    </div>
  </div>

  <div class="game-area">
    <canvas id="cvs"></canvas>

    <div class="countdown-wrap" id="cdWrap">
      <div class="cdown-ring">
        <svg width="100" height="100" viewBox="0 0 100 100">
          <circle class="cdown-track" cx="50" cy="50" r="45"/>
          <circle class="cdown-fill"  cx="50" cy="50" r="45" id="cdArc"/>
        </svg>
        <div class="cdown-num">
          <div class="cdown-sec" id="cdSec">10</div>
          <div class="cdown-txt">сек</div>
        </div>
      </div>
      <div class="cdown-hint" id="cdHint">Ставки <span>принимаются</span></div>
    </div>

    <div class="mult-overlay" id="multOverlay" style="opacity:0">
      <div class="mult-label">МНОЖИТЕЛЬ</div>
      <div class="mult-val c-neutral" id="multVal">1.00<span class="mult-x">×</span></div>
    </div>

    <div class="status-badge sb-wait" id="statusBadge">ПРИЁМ СТАВОК</div>
  </div>

  <div class="history-bar" id="histBar">
    <span class="h-label">ИСТОРИЯ</span>
  </div>

  <div class="bet-panel">
    <div class="bet-row">
      <div class="bet-lbl">Ставка</div>
      <input type="number" class="bet-input" id="betInput" value="100" min="1" placeholder="0">
    </div>

    <div class="qbets">
      <button class="qb" id="qb10"   onclick="qBet(10)">10</button>
      <button class="qb" id="qb50"   onclick="qBet(50)">50</button>
      <button class="qb" id="qb100"  onclick="qBet(100)">100</button>
      <button class="qb" id="qb250"  onclick="qBet(250)">250</button>
      <button class="qb" id="qbhalf" onclick="halfBet()">½</button>
      <button class="qb" id="qbx2"   onclick="doubleBet()">×2</button>
      <button class="qb" id="qbmax"  onclick="maxBet()">MAX</button>
    </div>

    <div class="auto-row">
      <div class="tgl-wrap" onclick="toggleAuto()">
        <div class="tgl" id="autoTgl"></div>
        <div class="tgl-lbl">Авто-кэшаут</div>
      </div>
      <input type="number" class="auto-in" id="autoIn" value="2.00" step="0.10" min="1.10" disabled>
      <span style="color:var(--muted);font-size:13px;font-weight:700">×</span>
    </div>
  </div>

  <button class="btn-action btn-place" id="btnAction" onclick="handleAction()">
    ПОСТАВИТЬ
  </button>

  <div class="stats-row">
    <div class="stat-card">
      <div class="stat-v sv-g" id="sWins">0</div>
      <div class="stat-l">Побед</div>
    </div>
    <div class="stat-card">
      <div class="stat-v sv-r" id="sLoss">0</div>
      <div class="stat-l">Поражений</div>
    </div>
    <div class="stat-card">
      <div class="stat-v sv-o" id="sProfit">0</div>
      <div class="stat-l">Прибыль</div>
    </div>
  </div>

</div>

<script>
// ── TELEGRAM ──────────────────────────────────────────────────
const tg = window.Telegram?.WebApp;
if (tg) { tg.ready(); tg.expand(); tg.setHeaderColor('#070710'); tg.setBackgroundColor('#070710'); }
const tgUser = tg?.initDataUnsafe?.user;
document.getElementById('username').textContent =
  tgUser ? (tgUser.first_name + (tgUser.last_name ? ' ' + tgUser.last_name : '')) : 'Гость';

// ── STATE ─────────────────────────────────────────────────────
// 'waiting' → (10s) → 'running' → (crash) → (3s) → 'waiting'
let gameState   = 'waiting';
let balance     = parseInt(localStorage.getItem('cb') || '1000');
let betAmount   = 0;
let hasBet      = false;
let cashedOut   = false;
let autoCashout = false;
let autoAt      = 2.00;
let crashPoint  = 1.00;
let currentMult = 1.00;
let points      = [];
let startTime   = 0;
let frameId     = null;
let cdSecs      = 10;
let cdInterval  = null;
let history     = JSON.parse(localStorage.getItem('ch') || '[]');
let stats       = JSON.parse(localStorage.getItem('cs') || '{"w":0,"l":0,"p":0}');
const WAIT_SECS = 10;

// ── CANVAS ───────────────────────────────────────────────────
const cvs = document.getElementById('cvs');
const ctx = cvs.getContext('2d');
function resizeCvs() { cvs.width = cvs.offsetWidth; cvs.height = cvs.offsetHeight; }
resizeCvs();
window.addEventListener('resize', () => { resizeCvs(); drawCvs(); });

function drawCvs() {
  const W = cvs.width, H = cvs.height;
  ctx.clearRect(0, 0, W, H);
  if (points.length < 2) return;
  const maxX = points[points.length-1][0];
  const maxY = Math.max(...points.map(p=>p[1]), 2);
  const toX  = x => (x/maxX)*(W-24)+12;
  const toY  = y => H-8 - ((y-1)/(maxY-1))*(H-28);
  const crashed = gameState==='crashed';
  ctx.strokeStyle='rgba(0,229,255,0.05)'; ctx.lineWidth=1;
  for(let i=1;i<4;i++){ctx.beginPath();ctx.moveTo(0,H*i/4);ctx.lineTo(W,H*i/4);ctx.stroke();}
  const g=ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0, crashed?'rgba(255,60,90,.28)':'rgba(0,229,255,.22)');
  g.addColorStop(1,'rgba(0,0,0,0)');
  ctx.beginPath();
  ctx.moveTo(toX(points[0][0]),toY(points[0][1]));
  points.forEach(p=>ctx.lineTo(toX(p[0]),toY(p[1])));
  const lp=points[points.length-1];
  ctx.lineTo(toX(lp[0]),H); ctx.lineTo(toX(points[0][0]),H); ctx.closePath();
  ctx.fillStyle=g; ctx.fill();
  ctx.beginPath();
  ctx.moveTo(toX(points[0][0]),toY(points[0][1]));
  points.forEach(p=>ctx.lineTo(toX(p[0]),toY(p[1])));
  ctx.strokeStyle=crashed?'#ff3c5a':'#00e5ff'; ctx.lineWidth=3;
  ctx.shadowColor=crashed?'#ff3c5a':'#00e5ff'; ctx.shadowBlur=14;
  ctx.stroke(); ctx.shadowBlur=0;
  const lx=toX(lp[0]),ly=toY(lp[1]);
  ctx.beginPath(); ctx.arc(lx,ly,5,0,Math.PI*2);
  ctx.fillStyle=crashed?'#ff3c5a':'#00e5ff';
  ctx.shadowColor=crashed?'#ff3c5a':'#00e5ff'; ctx.shadowBlur=18; ctx.fill(); ctx.shadowBlur=0;
}

// ── CRASH GENERATOR ──────────────────────────────────────────
function genCrash() {
  const r = Math.random();
  if (r < 0.06) return 1.00 + Math.random()*0.25;
  if (r < 0.30) return 1.20 + Math.random()*0.70;
  if (r < 0.55) return 1.80 + Math.random()*1.20;
  if (r < 0.72) return 2.50 + Math.random()*2.50;
  if (r < 0.85) return 4.00 + Math.random()*6.00;
  if (r < 0.93) return 8.00 + Math.random()*17.0;
  return 20.0 + Math.random()*80.0;
}

// ── COUNTDOWN ────────────────────────────────────────────────
function startCountdown() {
  gameState = 'waiting';
  hasBet = false; cashedOut = false; betAmount = 0;
  cdSecs = WAIT_SECS; points = []; currentMult = 1.00;

  document.getElementById('cdWrap').classList.remove('hidden');
  document.getElementById('multOverlay').style.opacity = '0';
  setStatus('ПРИЁМ СТАВОК', 'sb-wait');
  setQBtnsDisabled(false);
  document.getElementById('betInput').disabled = false;
  updateBtn();
  updateArc(WAIT_SECS);
  document.getElementById('cdSec').textContent = WAIT_SECS;

  clearInterval(cdInterval);
  cdInterval = setInterval(() => {
    cdSecs--;
    document.getElementById('cdSec').textContent = cdSecs;
    updateArc(cdSecs);
    if (cdSecs <= 0) { clearInterval(cdInterval); launchRound(); }
  }, 1000);
}

function updateArc(cur) {
  const pct = cur / WAIT_SECS;
  const arc = document.getElementById('cdArc');
  arc.style.strokeDashoffset = 283 - 283*pct;
  arc.style.stroke = pct > 0.5 ? 'var(--purple)' : pct > 0.2 ? 'var(--gold)' : 'var(--red)';
  const hint = document.getElementById('cdHint');
  if (hasBet) hint.innerHTML = `Ставка <span style="color:var(--green)">${fmtN(betAmount)} 🪙 ✓</span>`;
  else hint.innerHTML = `Ставки <span>принимаются</span>`;
}

// ── LAUNCH ROUND ─────────────────────────────────────────────
function launchRound() {
  crashPoint = genCrash();
  gameState = 'running';
  startTime = performance.now();
  points = [[0, 1]];

  document.getElementById('cdWrap').classList.add('hidden');
  document.getElementById('multOverlay').style.opacity = '1';
  setStatus('В ИГРЕ', 'sb-run');
  document.getElementById('betInput').disabled = true;
  setQBtnsDisabled(true);
  updateBtn();

  function loop(now) {
    const t = (now - startTime) / 1000;
    currentMult = Math.pow(Math.E, t * 0.75);

    if (hasBet && !cashedOut && autoCashout && currentMult >= autoAt) {
      doCashout();
    }

    if (currentMult >= crashPoint) {
      currentMult = crashPoint;
      points.push([t, currentMult]);
      drawCvs();
      onCrash();
      return;
    }

    points.push([t, currentMult]);
    drawCvs();
    setMultDisplay(currentMult, 'c-neutral');

    if (hasBet && !cashedOut) {
      document.getElementById('btnAction').textContent = 'ЗАБРАТЬ  ' + fmtN(Math.floor(betAmount * currentMult)) + ' 🪙';
    }

    frameId = requestAnimationFrame(loop);
  }
  frameId = requestAnimationFrame(loop);
}

// ── CRASH ────────────────────────────────────────────────────
function onCrash() {
  cancelAnimationFrame(frameId);
  gameState = 'crashed';
  setStatus('💥 КРАШ ' + fmt(crashPoint) + '×', 'sb-crash');
  setMultDisplay(crashPoint, 'c-red');
  addHistory(parseFloat(fmt(crashPoint)));

  if (hasBet && !cashedOut) {
    stats.l++; stats.p -= betAmount;
    saveAll();
    showToast('КРАШ! −' + fmtN(betAmount) + ' 🪙', 'tl');
    spawnPts('red');
    sendBot(false, 0, crashPoint);
  }

  hasBet = false;
  updateBtn();
  setTimeout(startCountdown, 3000);
}

// ── CASHOUT ──────────────────────────────────────────────────
function doCashout() {
  if (!hasBet || cashedOut) return;
  cashedOut = true;
  const win = Math.floor(betAmount * currentMult);
  balance += win;
  stats.w++; stats.p += (win - betAmount);
  saveAll();
  showToast('+' + fmtN(win) + ' 🪙  при ' + fmt(currentMult) + '×', 'tw');
  spawnPts('green');
  setMultDisplay(currentMult, 'c-green');
  setStatus('✓ КЭШАУТ ' + fmt(currentMult) + '×', 'sb-cashout');
  sendBot(true, win, currentMult);
  updateBtn();
}

// ── PLACE / CANCEL BET ───────────────────────────────────────
function placeBet() {
  const v = parseInt(document.getElementById('betInput').value) || 0;
  if (v < 1)       { showToast('Минимум 1 монета!', 'ti'); return; }
  if (v > balance) { showToast('Недостаточно монет!', 'tl'); return; }
  betAmount = v;
  balance -= v;
  hasBet = true;
  saveAll();
  updateBtn();
  updateArc(cdSecs);
  setQBtnsDisabled(true);
  document.getElementById('betInput').disabled = true;
  showToast('Ставка ' + fmtN(v) + ' 🪙 принята ✓', 'tw');
}

function cancelBet() {
  if (!hasBet || gameState !== 'waiting') return;
  balance += betAmount; betAmount = 0; hasBet = false;
  saveAll();
  updateBtn();
  updateArc(cdSecs);
  setQBtnsDisabled(false);
  document.getElementById('betInput').disabled = false;
  showToast('Ставка отменена', 'ti');
}

// ── BUTTON ───────────────────────────────────────────────────
function handleAction() {
  if (gameState === 'waiting') {
    if (!hasBet) placeBet(); else cancelBet();
  } else if (gameState === 'running') {
    if (hasBet && !cashedOut) doCashout();
  }
}

function updateBtn() {
  const btn = document.getElementById('btnAction');
  if (gameState === 'waiting') {
    if (!hasBet) {
      btn.className = 'btn-action btn-place';
      btn.textContent = 'ПОСТАВИТЬ';
      btn.disabled = false;
    } else {
      btn.className = 'btn-action btn-cancel';
      btn.textContent = 'ОТМЕНИТЬ СТАВКУ (' + fmtN(betAmount) + ' 🪙)';
      btn.disabled = false;
    }
  } else if (gameState === 'running') {
    if (!hasBet) {
      btn.className = 'btn-action btn-wait';
      btn.textContent = 'СТАВКИ ЗАКРЫТЫ';
      btn.disabled = true;
    } else if (cashedOut) {
      btn.className = 'btn-action btn-wait';
      btn.textContent = '✓ КЭШАУТ ВЫПОЛНЕН';
      btn.disabled = true;
    } else {
      btn.className = 'btn-action btn-cashout';
      btn.textContent = 'ЗАБРАТЬ  ' + fmtN(Math.floor(betAmount * currentMult)) + ' 🪙';
      btn.disabled = false;
    }
  } else {
    btn.className = 'btn-action btn-wait';
    btn.textContent = 'СЛЕДУЮЩИЙ РАУНД...';
    btn.disabled = true;
  }
}

// ── QUICK BETS ───────────────────────────────────────────────
function canEditBet() { return gameState === 'waiting' && !hasBet; }

function qBet(v) {
  if (!canEditBet()) return;
  document.getElementById('betInput').value = Math.min(v, balance);
}
function halfBet() {
  if (!canEditBet()) return;
  const cur = parseInt(document.getElementById('betInput').value)||0;
  document.getElementById('betInput').value = Math.max(1, Math.floor(cur/2));
}
function doubleBet() {
  if (!canEditBet()) return;
  const cur = parseInt(document.getElementById('betInput').value)||0;
  document.getElementById('betInput').value = Math.min(cur*2||10, balance);
}
function maxBet() {
  if (!canEditBet()) return;
  document.getElementById('betInput').value = balance;
}

function setQBtnsDisabled(dis) {
  document.querySelectorAll('.qb').forEach(b => b.disabled = dis);
}

// ── AUTO CASHOUT ─────────────────────────────────────────────
function toggleAuto() {
  autoCashout = !autoCashout;
  document.getElementById('autoTgl').className = 'tgl' + (autoCashout?' on':'');
  document.getElementById('autoIn').disabled = !autoCashout;
}
document.getElementById('autoIn').addEventListener('change', function() {
  autoAt = Math.max(1.1, parseFloat(this.value)||2.0);
  this.value = autoAt.toFixed(2);
});

// ── HISTORY ──────────────────────────────────────────────────
function addHistory(v) {
  history.unshift(v);
  if (history.length > 30) history.pop();
  localStorage.setItem('ch', JSON.stringify(history));
  renderHistory();
}
function renderHistory() {
  const bar = document.getElementById('histBar');
  bar.innerHTML = '<span class="h-label">ИСТОРИЯ</span>';
  history.forEach(v => {
    const c = document.createElement('span');
    c.className = 'hchip ' + (v<1.5?'low':v<3?'mid':'high');
    c.textContent = fmt(v)+'×';
    bar.appendChild(c);
  });
}

// ── DISPLAY ──────────────────────────────────────────────────
function setStatus(t, cls) {
  const el = document.getElementById('statusBadge');
  el.textContent = t; el.className = 'status-badge ' + cls;
}
function setMultDisplay(v, cls) {
  const el = document.getElementById('multVal');
  el.innerHTML = fmt(v) + '<span class="mult-x">×</span>';
  el.className = 'mult-val ' + cls;
}
function fmt(n)  { return parseFloat(n).toFixed(2); }
function fmtN(n) { return Math.round(n).toLocaleString('ru'); }

function updateUI() {
  document.getElementById('balanceEl').textContent = fmtN(balance);
  document.getElementById('sWins').textContent = stats.w;
  document.getElementById('sLoss').textContent = stats.l;
  const p = stats.p;
  const el = document.getElementById('sProfit');
  el.textContent = (p>=0?'+':'') + fmtN(p);
  el.className = 'stat-v ' + (p>0?'sv-g':p<0?'sv-r':'sv-o');
}

function saveAll() {
  localStorage.setItem('cb', balance);
  localStorage.setItem('cs', JSON.stringify(stats));
  updateUI();
}

// ── TOAST ─────────────────────────────────────────────────────
let tTimer;
function showToast(msg, cls) {
  clearTimeout(tTimer);
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = 'toast ' + cls + ' show';
  tTimer = setTimeout(() => t.classList.remove('show'), 2600);
}

// ── PARTICLES ────────────────────────────────────────────────
function spawnPts(color) {
  const w = document.getElementById('particles');
  const cols = color==='green'?['#00ff88','#00e5ff','#ffd600']:['#ff3c5a','#ff8800','#ff6080'];
  for (let i=0;i<22;i++) {
    const p = document.createElement('div');
    const sz = 4+Math.random()*7;
    p.className='pt';
    p.style.cssText=`width:${sz}px;height:${sz}px;background:${cols[~~(Math.random()*cols.length)]};left:${25+Math.random()*50}%;top:35%;--tx:${(Math.random()-.5)*280}px;--ty:${-(80+Math.random()*260)}px;animation-duration:${.6+Math.random()*.7}s;animation-delay:${Math.random()*.15}s`;
    w.appendChild(p);
    setTimeout(()=>p.remove(),1400);
  }
}

// ── BOT ───────────────────────────────────────────────────────
function sendBot(won, amount, mult) {
  if (!tg) return;
  try { tg.sendData(JSON.stringify({action:'crash_result',won,amount,multiplier:parseFloat(fmt(mult)),balance,user_id:tgUser?.id})); } catch(e){}
}

// ── INPUT GUARD ───────────────────────────────────────────────
document.getElementById('betInput').addEventListener('input', function() {
  if (this.value !== '' && parseFloat(this.value) > balance) this.value = balance;
  if (this.value !== '' && parseFloat(this.value) < 1) this.value = 1;
});

// ── BOOT ──────────────────────────────────────────────────────
renderHistory();
updateUI();
startCountdown();
</script>
</body>
</html>
